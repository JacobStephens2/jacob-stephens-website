<body>
    <h1 class="title">Message</h1>
    <p class="center"><a href="/">Home</a></p>

    <p>You can email me directly if you would like to get in touch.</p>

    <p>
        <a href="mailto:jacob@stephens.page">Email me</a>
        at
        <span class="email-address">jacob@stephens.page</span>
        <button class="copy-button" type="button" data-copy-text="jacob@stephens.page" aria-label="Copy email address">Copy</button>
    </p>

    <p class="center footer">&copy; 2025 <a href="https://blog.stephens.page">Jacob Stephens</a> |
        <a href="/privacy-policy">Privacy Policy</a>
    </p>
    <script>
      for (const button of document.querySelectorAll('.copy-button')) {
        button.addEventListener('click', async () => {
          const originalText = button.textContent;
          const textToCopy = button.dataset.copyText;

          try {
            await navigator.clipboard.writeText(textToCopy);
            button.textContent = 'Copied email';
          } catch (error) {
            button.textContent = 'Press Ctrl+C';
          }

          setTimeout(() => {
            button.textContent = originalText;
          }, 1600);
        });
      }
    </script>
</body>
